name: Release binaries

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Install swag
        run: go install github.com/swaggo/swag/cmd/swag@latest

      - name: Build frontend
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Embed frontend
        run: |
          rm -rf backend/internal/static/dist/*
          cp -r frontend/dist/. backend/internal/static/dist/

      - name: Generate Swagger docs
        working-directory: backend
        run: swag init -d cmd/server,internal/api -g main.go --parseDependency --parseInternal -o docs

      - name: Build binary
        working-directory: backend
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ github.ref_name }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          mkdir -p ../dist
          out="../dist/openscanner-${VERSION#v}-${GOOS}-${GOARCH}${ext}"
          go build \
            -trimpath \
            -ldflags="-s -w -X github.com/openscanner/openscanner/internal/config.Version=${VERSION#v}" \
            -o "$out" \
            ./cmd/server
          echo "binary=$out" >> "$GITHUB_ENV"

      - name: Package
        working-directory: dist
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          stem="openscanner-${VERSION#v}-${GOOS}-${GOARCH}"
          cp ../README.md ../CHANGELOG.md ../LICENSE* . 2>/dev/null || true
          if [ "$GOOS" = "windows" ]; then
            mv "${stem}.exe" "openscanner.exe"
            zip -9 "${stem}.zip" "openscanner.exe" README.md CHANGELOG.md LICENSE* 2>/dev/null || \
              zip -9 "${stem}.zip" "openscanner.exe" README.md CHANGELOG.md
            rm "openscanner.exe"
          else
            mv "${stem}" "openscanner"
            tar czf "${stem}.tar.gz" "openscanner" README.md CHANGELOG.md LICENSE* 2>/dev/null || \
              tar czf "${stem}.tar.gz" "openscanner" README.md CHANGELOG.md
            rm "openscanner"
          fi
          rm -f README.md CHANGELOG.md LICENSE*

      - name: Checksums
        working-directory: dist
        run: |
          for f in *.tar.gz *.zip; do
            [ -e "$f" ] || continue
            sha256sum "$f" > "$f.sha256"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openscanner-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  release:
    name: Attach to release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Aggregate checksums
        working-directory: dist
        run: |
          cat *.sha256 > SHA256SUMS.txt
          rm *.sha256

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
