# golangci-lint configuration for OpenScanner.
#
# Philosophy: enable high-signal linters that catch real bugs (leaked HTTP
# bodies, shadowed errors, SQL rows never closed, unhandled context, SSRF-ish
# issues via gosec) without drowning the codebase in style complaints.
#
# Autogenerated code (sqlc, swagger) is excluded — it's machine output and
# formatted differently on purpose.
#
# Upgrade to golangci-lint v2 config format when the pinned version bumps.

run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    # Default set (catches the majority of real bugs)
    - errcheck # unchecked errors
    - gosimple # code can be simpler
    - govet # stdlib vet: shadowing, printf, copylock, etc.
    - ineffassign # unused assignments
    - staticcheck # huge check set, pragmatic
    - unused # unused constants/funcs/types/vars

    # Extra high-signal linters
    - bodyclose # http.Response.Body.Close() not called — leaks conns
    - contextcheck # functions should propagate context.Context
    - errorlint # proper %w wrapping and errors.Is/As usage
    - gosec # security (OWASP-aligned, catches shell injection etc.)
    - misspell # typos in comments/strings
    - noctx # net/http calls without context
    - nilerr # 'return nil' when err != nil
    - prealloc # slice preallocation opportunities
    - revive # modern golint replacement, style + bug rules
    - rowserrcheck # sql.Rows.Err() not called
    - sqlclosecheck # db/sql: Stmt/Rows close checks
    - unconvert # unnecessary type conversions
    - unparam # function params always the same value / unused returns

issues:
  # Don't cap reports at 3/50 like the default.
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-dirs:
    - docs # swagger generated
  exclude-files:
    - "internal/db/.*\\.sql\\.go$" # sqlc generated
    - "internal/db/models\\.go$"
    - "internal/db/db\\.go$"
    - "internal/db/querier\\.go$"
    - "internal/handler/shared/dto\\.go$" # swagger stubs — field names must mirror wire shape for doc readability
  exclude-rules:
    # Test files: relax a handful of rules that don't add value there.
    - path: _test\.go
      linters:
        - errcheck # t.Helper+fatal is fine without return-value checks
        - gosec # test fixtures routinely do things gosec flags (hardcoded creds, weak crypto for RNG, etc.)
        - noctx # httptest constants, context.TODO() is common
        - unparam # test helpers often have parameters we pass constants for
        - bodyclose # websocket.Dial handshake responses don't need explicit close; many test patterns discard bodies intentionally
        - unconvert # tests sometimes use explicit conversions for clarity
    # Migration runner intentionally calls os.Exit.
    - path: cmd/migrate/main\.go
      linters:
        - revive

linters-settings:
  errcheck:
    # Don't require checking the error on rollback/close — common idiom.
    exclude-functions:
      - (io.Closer).Close
      - (*database/sql.DB).Close
      - (*database/sql.Rows).Close
      - (*database/sql.Tx).Rollback
      - (net/http.ResponseWriter).Write
  gosec:
    # G104 (unhandled errors) — errcheck covers this more precisely.
    # G115 (integer overflow) — too many false positives on int64↔int conversions.
    # G306 (file perms): we intentionally chmod 0o644 recordings.
    excludes:
      - G104
      - G115
      - G306
  govet:
    enable-all: true
    disable:
      - fieldalignment # noisy, mostly cosmetic
      - shadow # covered by staticcheck, too many false positives on err shadowing
  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
        disabled: true # too noisy on internal packages
      - name: increment-decrement
      - name: var-naming
        disabled: true # project convention: Go field names mirror DB/wire field names (SystemsJson, Url, ApiKey)
      - name: var-declaration
      - name: package-comments
        disabled: true
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
      - name: empty-block
      - name: superfluous-else
      - name: unused-parameter
        disabled: true # too noisy on interface implementations
      - name: unreachable-code
      - name: redefines-builtin-id
  unparam:
    check-exported: false
