version: "2"
sql:
  - engine: "sqlite"
    queries: "queries"
    schema: "schema"
    gen:
      go:
        package: "db"
        out: "../internal/db"
        emit_json_tags: true
        emit_db_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        emit_exported_queries: false
        overrides:
          - column: "users.password_hash"
            go_struct_tag: 'db:"password_hash" json:"-"'
