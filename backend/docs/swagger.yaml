            $ref: '#/definitions/internal_api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List bookmarked calls with metadata
      tags:
      - Bookmarks
  /call-upload:
    post:
      consumes:
      - multipart/form-data
      description: Ingest a radio call with audio and metadata. Requires a valid API
        key.
      parameters:
      - description: Audio file
        in: formData
        name: audio
        required: true
        type: file
      - description: Unix timestamp of the call
        in: formData
        name: dateTime
        required: true
        type: integer
      - description: Radio system ID
        in: formData
        name: systemId
        required: true
        type: integer
      - description: Talkgroup ID
        in: formData
        name: talkgroupId
        required: true
        type: integer
      - description: Source unit ID
        in: formData
        name: source
        type: integer
      - description: Frequency in Hz
        in: formData
        name: frequency
        type: integer
      - description: Call duration in seconds
        in: formData
        name: duration
        type: number
      - description: Talkgroup label for auto-populate
        in: formData
        name: talkgroupLabel
        type: string
      - description: Talkgroup tag name
        in: formData
        name: talkgroupTag
        type: string
      - description: Talkgroup group name
        in: formData
        name: talkgroupGroup
        type: string
      - description: Talkgroup display name
        in: formData
        name: talkgroupName
        type: string
      - description: System label
        in: formData
        name: systemLabel
        type: string
      - description: JSON array of patched talkgroup IDs
        in: formData
        name: patches
        type: string
      - description: Original audio file name
        in: formData
        name: audioName
        type: string
      - description: Audio MIME type
        in: formData
        name: audioType
        type: string
      - description: Site identifier
        in: formData
        name: site
        type: string
      - description: Channel identifier
        in: formData
        name: channel
        type: string
      - description: Decoder software name
        in: formData
        name: decoder
        type: string
      - description: Decoding error count
        in: formData
        name: errorCount
        type: integer
      - description: Signal spike count
        in: formData
        name: spikeCount
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Call ingested successfully
          schema:
            properties:
              id:
                type: integer
            type: object
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "401":
          description: API key required
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "429":
          description: Rate limit exceeded
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
      security:
      - APIKeyAuth: []
      summary: Upload a call recording
      tags:
      - Upload
  /calls:
    get:
      description: Paginated search of the call archive with optional filters.
      parameters:
      - description: Filter by system DB ID
        in: query
        name: system_id
        type: integer
      - description: Filter by talkgroup DB ID
        in: query
        name: talkgroup_id
        type: integer
      - description: Unix timestamp lower bound
        in: query
        name: date_from
        type: integer
      - description: Unix timestamp upper bound
        in: query
        name: date_to
        type: integer
      - default: desc
        description: 'Sort order: asc or desc'
        enum:
        - asc
        - desc
        in: query
        name: sort
        type: string
      - default: 1
        description: Page number (1-based)
        in: query
        name: page
        type: integer
      - default: 25
        description: Results per page (max 100)
        in: query
        name: limit
        type: integer
      - description: Show only bookmarked calls
        in: query
        name: bookmarked_only
        type: boolean
      - description: Filter by transcript text
        in: query
        name: transcript
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Paginated call results
          schema:
            $ref: '#/definitions/internal_api.CallSearchResponse'
        "400":
          description: Invalid query parameter
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Search calls
      tags:
      - Calls
  /calls/{id}/audio:
    get:
      description: Stream the audio file for a specific call. Requires authentication
        or public access mode.
      parameters:
      - description: Call ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/octet-stream
      responses:
        "200":
          description: Audio file
          schema:
            type: file
        "400":
          description: Invalid call ID
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "401":
          description: Authentication required
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "404":
          description: Call or audio not found
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get call audio file
      tags:
      - Calls
  /calls/{id}/share:
    delete:
      description: Removes the shared_links record. Only the original sharer or an
        admin can unshare.
      parameters:
      - description: Call ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Unshare a call
      tags:
      - Sharing
    get:
      description: Returns the share token for a call if it exists, for authenticated
        users.
      parameters:
      - description: Call ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.ShareCreateResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get call share status
      tags:
      - Sharing
    post:
      description: Creates a shared_links record for the call and returns the token
        + URL.
      parameters:
      - description: Call ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.ShareCreateResponse'
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_api.ShareCreateResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Share a call
      tags:
      - Sharing
  /health:
    get:
      description: Returns server status and version for readiness probes and Docker
        HEALTHCHECK.
      produces:
      - application/json
      responses:
        "200":
          description: Server is healthy
          schema:
            properties:
              status:
                type: string
              version:
                type: string
            type: object
      summary: Health check
      tags:
      - Health
  /setup:
    post:
      consumes:
      - application/json
      description: Creates the initial admin user and marks setup as complete. Returns
        409 if setup is already done, 400 for invalid input.
      parameters:
      - description: Admin credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_api.setupRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              ok:
                type: boolean
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
      summary: Complete initial setup
      tags:
      - Setup
  /setup/status:
    get:
      description: Returns whether initial setup is needed and whether public access
        is active. Always unauthenticated.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.setupStatusResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
      summary: Get setup status
      tags:
      - Setup
  /shared/{token}:
    get:
      description: Returns call metadata as JSON for public viewing. No authentication
        required.
      parameters:
      - description: Share token
        in: path
        name: token
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.ShareResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
      summary: Get shared call by token
      tags:
      - Sharing
  /shared/{token}/audio:
    get:
      description: Serves the audio file for a shared call. No authentication required.
      parameters:
      - description: Share token
        in: path
        name: token
        required: true
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: OK
          schema:
            type: file
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
      summary: Get shared call audio
      tags:
      - Sharing
securityDefinitions:
  APIKeyAuth:
    description: API key for call upload endpoints
    in: header
    name: X-API-Key
    type: apiKey
  BearerAuth:
    description: JWT token prefixed with "Bearer "
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
