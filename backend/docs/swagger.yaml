info:
  contact: {}
  description: Radio call manager API — real-time audio streaming, call management,
    and admin CRUD.
  title: OpenScanner API
  version: "1.0"
paths:
  /admin/activity/chart:
    get:
      description: Returns call counts bucketed by hour for the last 24 hours.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ActivityChartResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get activity chart data
      tags:
      - Admin
  /admin/activity/stats:
    get:
      description: Returns call counts (today, this week, total), active listeners,
        and server uptime.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ActivityStatsResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get activity statistics
      tags:
      - Admin
  /admin/activity/top-talkgroups:
    get:
      description: Returns the top 10 talkgroups by call count over the last 24 hours.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/TopTalkgroupsResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get top talkgroups
      tags:
      - Admin
  /admin/apikeys:
    get:
      description: Returns all API keys.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/ApiKeyResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: List API keys
      tags:
      - Admin
    post:
      consumes:
      - application/json
      description: Creates a new API key and returns the plain-text key once.
      parameters:
      - description: API key to create
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/CreateAPIKeyRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/ApiKeyCreateResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create an API key
      tags:
      - Admin
  /admin/apikeys/{id}:
    delete:
      description: Deletes an API key by ID.
      parameters:
      - description: API key ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              ok:
                type: boolean
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete an API key
      tags:
      - Admin
    put:
      consumes:
      - application/json
      description: Updates an existing API key by ID.
      parameters:
      - description: API key ID
        in: path
        name: id
        required: true
        type: integer
      - description: API key fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/UpdateAPIKeyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ApiKeyResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update an API key
      tags:
      - Admin
  /admin/apikeys/reorder:
    put:
      consumes:
      - application/json
      description: Updates the display order of multiple API keys in one transaction.
      parameters:
