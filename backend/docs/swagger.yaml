host: localhost:3000
info:
  contact: {}
  description: Radio call manager API — real-time audio streaming, call management,
    and admin CRUD.
  title: OpenScanner API
  version: "1.0"
paths:
  /admin/activity/chart:
    get:
      description: Returns call counts bucketed by hour for the last 24 hours.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.ActivityChartResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get activity chart data
      tags:
      - Admin
  /admin/activity/stats:
    get:
      description: Returns call counts (today, this week, total), active listeners,
        and server uptime.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.ActivityStatsResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get activity statistics
      tags:
      - Admin
  /admin/activity/top-talkgroups:
    get:
      description: Returns the top 10 talkgroups by call count over the last 24 hours.
      produces:
      - application/json
      responses:
        "200":
          description: OK
