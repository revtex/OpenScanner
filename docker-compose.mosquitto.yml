# Standalone bundled MQTT broker for the Trunk Recorder integration.
#
# Unlike the `mqtt` profile in docker-compose.openscanner.yml — which
# auto-generates its config on first run — this compose file relies on the
# committed static files under ./mosquitto/config/ and uses the upstream
# eclipse-mosquitto image's default entrypoint. Edit the conf or passwd
# files directly, then `docker compose restart`.
#
# Bring it up alongside the main stack:
#
#     docker compose \
#       -f docker-compose.openscanner.yml \
#       -f docker-compose.mosquitto.yml \
#       up -d
#
# Or run it on its own:
#
#     docker compose -f docker-compose.mosquitto.yml up -d
#
# Add a user before pointing trunk-recorder at it:
#
#     docker compose -f docker-compose.mosquitto.yml exec mosquitto \
#       mosquitto_passwd -b /mosquitto/config/passwd <user> <password>
#     docker compose -f docker-compose.mosquitto.yml restart mosquitto

services:
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      # Loopback-only by default. Change to "0.0.0.0:1883:1883" to expose
      # to the LAN (and remember to firewall + add users first).
      - "127.0.0.1:1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
