services:
  whisper:
    image: ghcr.io/mutablelogic/go-whisper-cuda
    ports:
      - "8081:8081"
    volumes:
      - whisper-data:/data
    environment:
      - GOWHISPER_DIR=/data
      - GOWHISPER_ADDR=0.0.0.0:8081
    command: ["run"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  whisper-data:
