# OpenScanner — bundled mosquitto config (static variant)
#
# This file is used by docker-compose.mosquitto.yml, which runs the
# default eclipse-mosquitto entrypoint against the files in this folder.
# Edit it directly and `docker compose restart mosquitto` to apply.
#
# The auth-bootstrapping variant in docker-compose.openscanner.yml writes
# an equivalent file at first start; the two configs are intentionally
# kept in sync.

listener 1883 0.0.0.0
allow_anonymous false
password_file /mosquitto/config/passwd

persistence true
persistence_location /mosquitto/data/

log_dest file /mosquitto/log/mosquitto.log
