# OpenScanner — bundled mosquitto config (static variant)
#
# This file is used by mosquitto/docker-compose.yml, which runs the
# default eclipse-mosquitto entrypoint against the files in this folder.
# Edit it directly and `docker compose restart mosquitto` to apply.
#
# Ships with anonymous access enabled so the broker boots cleanly on a
# fresh checkout (no chicken-and-egg with the not-yet-created passwd
# file). After your first `mosquitto_passwd` run, flip the two auth
# lines below — see ./config/README.md for the full bootstrap.

listener 1883 0.0.0.0

## Authentication ##
# First-run default: anonymous. Once you've created /mosquitto/config/passwd
# (see config/README.md), set allow_anonymous false and uncomment the
# password_file line, then `docker compose restart mosquitto`.
allow_anonymous true
#allow_anonymous false
#password_file /mosquitto/config/passwd

persistence true
persistence_location /mosquitto/data/

# Log to stdout so `docker compose logs mosquitto` works and we don't
# need a writable bind-mounted log directory (the in-container mosquitto
# user is UID 1883 and can't write to a host-owned ./log/ folder).
log_dest stdout
